# Phase A run config — GRU sequence encoder, 1-minute bars
# First real architecture run: GRUEncoder replaces the SimpleMLP placeholder.
# Usage: python -m model.train --config configs/phase_a_gru.yaml --smoke-test-first

phase: "A"
window_length: 60
horizon: 12
horizon_weighting: "uniform"
feature_columns:
  - cvd
  - cvd_quote
  - vwap_20
  - vwap_50
  - anchored_vwap
  - realized_vol
  - log_return
  - norm_return
  - return_pct
  - vol_profile_low_bucket
split_config_ref: "model/config/splits.py"
active_split: "train"

batch_size: 256
learning_rate: 0.001
optimizer: "adam"
num_epochs: 30
seed: 42

model_class: "model.body.gru_encoder.GRUEncoder"
run_name: ""          # auto-generated if empty
notes: "Phase A GRU body — 10 features, 60-bar window, 12-step horizon, train split 2023-01 -> 2024-09"
